name: Daily Research Paper Digest

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11' # Specify your desired Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install arxiv requests beautifulsoup4

    - name: Run paper fetching script
      run: python fetch_papers.py


    - name: Push new README.md
      uses: github-actions-x/commit@v2.9
      with:
          github-token: ${{ secrets.ACCESS_TOKEN }}
          commit-message: "Github Action Automatic Update research_papers_digest"
          files: README.md
          rebase: 'true'
          name: 'github-actions[bot]'
          email: 'github-actions[bot]@users.noreply.github.com'

